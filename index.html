<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#e31e2f">
  <meta name="description" content="UNION ARENAのカードを高速に検索・絞り込みできるPWA">
  <title>UNION ARENA CARD DB</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon-192.png" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="./icons/icon-180.png" sizes="180x180">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <img src="./icons/icon-192.png" alt="" width="36" height="36">
      <div>
        <h1>UNION ARENA</h1>
        <p>CARD DATABASE</p>
      </div>
    </div>
    <div class="header-actions">
      <button id="filter-button" class="icon-button" type="button" aria-label="絞り込み">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 5h18v2H3zm3 6h12v2H6zm4 6h4v2h-4z"/></svg>
        <span id="filter-badge" class="filter-badge" hidden></span>
      </button>
      <button id="settings-button" class="icon-button" type="button" aria-label="設定">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.4 13a7.8 7.8 0 0 0 0-2l2.1-1.6-2-3.5-2.5 1a8 8 0 0 0-1.7-1l-.4-2.7h-4l-.4 2.7a8 8 0 0 0-1.7 1l-2.5-1-2 3.5L6.4 11a7.8 7.8 0 0 0 0 2l-2.1 1.6 2 3.5 2.5-1a8 8 0 0 0 1.7 1l.4 2.7h4l.4-2.7a8 8 0 0 0 1.7-1l2.5 1 2-3.5L19.4 13ZM13 15.5A3.5 3.5 0 1 1 13 8a3.5 3.5 0 0 1 0 7.5Z"/></svg>
      </button>
    </div>
  </header>

  <main>
    <section class="search-panel" aria-label="カード検索">
      <label class="search-box">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 19.6-5.2-5.2a7 7 0 1 0-1.4 1.4l5.2 5.2L21 19.6ZM5 10a5 5 0 1 1 10 0 5 5 0 0 1-10 0Z"/></svg>
        <input id="search-input" type="search" autocomplete="off" placeholder="カード名・番号・効果・特徴を検索">
      </label>
      <div class="result-row">
        <p><strong id="result-count">0</strong> cards</p>
        <button id="column-toggle" class="column-toggle" type="button" aria-label="表示列数を切り替え">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16v16H4V4Zm2 2v12h12V6H6Z"/></svg>
          <span id="column-count">3</span>
          <small>列</small>
        </button>
      </div>
    </section>

    <div id="loading" class="loading">
      <span class="spinner"></span>
      <p>カードデータを読み込んでいます</p>
    </div>
    <p id="empty-message" class="empty-message" hidden>条件に一致するカードがありません。</p>
    <section id="card-grid" class="card-grid" aria-live="polite"></section>
    <p id="load-status" class="load-status" hidden></p>
    <div id="load-sentinel" class="load-sentinel" aria-hidden="true"></div>
  </main>

  <dialog id="filter-dialog" class="sheet-dialog">
    <form method="dialog" class="dialog-card">
      <div class="dialog-header">
        <div>
          <p class="eyebrow">SEARCH OPTIONS</p>
          <h2>絞り込み</h2>
        </div>
        <button class="close-button" value="close" aria-label="閉じる">×</button>
      </div>
      <div id="filter-fields" class="filter-fields"></div>
      <div class="dialog-actions">
        <button id="reset-filters" class="secondary-button" type="button">リセット</button>
        <button id="apply-filters" class="primary-button" value="apply">適用</button>
      </div>
    </form>
  </dialog>

  <dialog id="card-dialog" class="card-dialog">
    <article class="detail-card">
      <button id="detail-close" class="detail-close" type="button" aria-label="閉じる">×</button>
      <button id="detail-previous" class="detail-nav detail-previous" type="button" aria-label="前のカード">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15.4 5.4-1.4-1.4-8 8 8 8 1.4-1.4L8.8 12l6.6-6.6Z"/></svg>
      </button>
      <button id="detail-next" class="detail-nav detail-next" type="button" aria-label="次のカード">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m8.6 18.6 1.4 1.4 8-8-8-8-1.4 1.4 6.6 6.6-6.6 6.6Z"/></svg>
      </button>
      <div id="detail-swipe-area" class="detail-visual">
        <img id="detail-image" alt="">
        <div id="variant-buttons" class="variant-buttons"></div>
        <p id="detail-position" class="detail-position"></p>
      </div>
      <div class="detail-content">
        <p id="detail-number" class="detail-number"></p>
        <h2 id="detail-name"></h2>
        <p id="detail-reading" class="detail-reading"></p>
        <div id="detail-tags" class="detail-tags"></div>
        <dl id="detail-stats" class="detail-stats"></dl>
        <section class="text-block">
          <h3>効果</h3>
          <p id="detail-effect"></p>
        </section>
        <section class="text-block">
          <h3>トリガー</h3>
          <p id="detail-trigger"></p>
        </section>
        <section id="detail-qa-section" class="text-block qa-block" hidden>
          <h3>Q&A</h3>
          <div id="detail-qa-list" class="qa-list"></div>
        </section>
        <section class="text-block">
          <h3>収録商品</h3>
          <p id="detail-product"></p>
        </section>
        <a id="detail-source" class="source-link" target="_blank" rel="noopener noreferrer">公式カード詳細を開く</a>
      </div>
    </article>
  </dialog>

  <dialog id="settings-dialog" class="sheet-dialog">
    <div class="dialog-card settings-card">
      <div class="dialog-header">
        <div>
          <p class="eyebrow">APPLICATION</p>
          <h2>設定</h2>
        </div>
        <button id="settings-close" class="close-button" type="button" aria-label="閉じる">×</button>
      </div>
      <section>
        <h3>オフライン画像</h3>
        <p>現在のカード画像をブラウザのキャッシュへ保存します。外部画像を含むため、端末とブラウザによって保存できない場合があります。</p>
        <button id="cache-images" class="primary-button" type="button">全画像をキャッシュ</button>
        <p id="cache-status" class="status-text"></p>
      </section>
      <section>
        <h3>データ</h3>
        <p id="data-status">未読込</p>
        <button id="reload-data" class="secondary-button" type="button">最新データを再読込</button>
      </section>
      <section>
        <h3>このデータベースについて</h3>
        <p>カード情報・画像の権利は各権利者に帰属します。</p>
        <a href="https://www.unionarena-tcg.com/jp/cardlist/" target="_blank" rel="noopener noreferrer">UNION ARENA 公式カードリスト</a>
      </section>
    </div>
  </dialog>

  <script src="./app.js" defer></script>
</body>
</html>
