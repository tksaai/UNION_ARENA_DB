name: Update card database

on:
  schedule:
    - cron: "15 18 * * *"
  workflow_dispatch:
    inputs:
      series:
        description: "latest, all, official series ID, or product code"
        required: false
        default: "latest"
        type: string
      download_images:
        description: "Download card images into this repository"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: update-union-arena-cards
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: python -m pip install -r requirements.txt

      - name: Synchronize official card data
        shell: bash
        run: |
          ARGS=(--series "${{ inputs.series || 'latest' }}")
          if [[ "${{ inputs.download_images }}" == "true" ]]; then
            ARGS+=(--download-images)
          fi
          python scripts/sync_cards.py "${ARGS[@]}"

      - name: Commit changes
        shell: bash
        run: |
          if [[ -z "$(git status --short)" ]]; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards.json
          if [[ -d Cards ]]; then
            git add Cards
          fi
          git commit -m "Update UNION ARENA card data"
          git push
